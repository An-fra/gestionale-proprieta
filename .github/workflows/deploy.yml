# Pubblicazione automatica su GitHub Pages (Story 1.2).
# Ogni push su main: cancelli di qualità → build → deploy. Nessun passaggio manuale.
name: Deploy su GitHub Pages

on:
  push:
    branches: [main]
  # Permette di lanciare il deploy a mano dalla scheda Actions, se serve.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un deploy alla volta; se ne arriva uno nuovo, quello in coda viene annullato.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Installa dipendenze
        run: npm ci

      # I cancelli di qualità della Story 1.1: se uno fallisce, non si pubblica.
      - name: Lint (codice + confini AD-7)
        run: npm run lint

      - name: Test
        run: npm run test

      # `build` include già il typecheck completo (src + vite.config).
      - name: Build
        run: npm run build

      - name: Configura Pages
        # Pages è già attivato (sorgente "GitHub Actions") tramite API con un token
        # utente: il GITHUB_TOKEN del workflow non ha il permesso di crearlo da zero
        # (errore "Resource not accessible by integration"). Qui serve solo a leggere
        # la configurazione del sito, non a crearlo.
        uses: actions/configure-pages@v6

      - name: Carica artefatto
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
